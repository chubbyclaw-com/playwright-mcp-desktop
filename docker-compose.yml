services:
  playwright-mcp-desktop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASEIMAGE: ubuntu
        BASETAG: 24.04
        ARG_VNC_DISPLAY: ":1"
        ARG_VNC_PORT: 5901
        ARG_VNC_RESOLUTION: 1280x720
        ARG_VNC_COL_DEPTH: 24
        ARG_VNC_VIEW_ONLY: false
        ARG_NOVNC_PORT: 6080
        ARG_PLAYWRIGHT_MCP_PORT: 9999
        ARG_APT_NO_RECOMMENDS: 1

    image: playwright-mcp-desktop:latest
    container_name: playwright-mcp-desktop
    hostname: playwright-mcp-desktop

    ports:
      - "5901:5901"   # VNC port
      - "6080:6080"   # noVNC web port
      - "9999:9999"   # Playwright MCP port

    volumes:
      - home-data:/root

    environment:
      - VNC_RESOLUTION=1280x720
      - VNC_COL_DEPTH=24
      - VNC_PORT=5901
      - VNC_PASSWORD=${VNC_PASSWORD:-password}  # VNC password, override via env var
      - NOVNC_PORT=6080
      - PLAYWRIGHT_MCP_PORT=9999
      - CHROME_USER_DATA_DIR=/root/.chrome-userdata
      - DISPLAY=:1
      - TZ=Asia/Singapore
      - NOVNC_HOME=/usr/libexec/novnc
      # Font configuration
      - FONTCONFIG_PATH=/etc/fonts

    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

    # Health check
    # Checks the three service ports (VNC/noVNC/MCP) and the Chromium process.
    # Avoids `curl /sse` (an infinite SSE stream) which leaked one hung process
    # per interval. Chromium auto-recovery is handled by browser-manager.sh.
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  home-data:
    driver: local
