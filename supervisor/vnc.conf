[program:vnc-server]
command=/usr/local/bin/start-vnc.sh
autostart=true
autorestart=true
priority=200
stderr_logfile=/var/log/supervisor/vnc-server.err.log
stdout_logfile=/var/log/supervisor/vnc-server.out.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=10
stderr_logfile_backups=10
user=root
startsecs=15
startretries=3
killasgroup=true
stopasgroup=true
environment=DISPLAY=":1",VNC_RESOLUTION="%(ENV_VNC_RESOLUTION)s",VNC_COL_DEPTH="%(ENV_VNC_COL_DEPTH)s",VNC_PASSWORD="%(ENV_VNC_PASSWORD)s",XDG_RUNTIME_DIR="/run/user/0"
